name: Contract Tests & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify contract structure
        run: |
          echo "✓ Checking contract files..."
          test -f contract/Cargo.toml || exit 1
          test -f contract/src/lib.rs || exit 1
          echo "✓ Contract files present"
      
      - name: Verify Cargo.toml syntax
        working-directory: contract
        run: cat Cargo.toml | grep -E "^name|^version|soroban-sdk"
      
      - name: Verify contract code
        working-directory: contract
        run: |
          grep -q "pub fn book_style" src/lib.rs || exit 1
          grep -q "pub fn complete_service" src/lib.rs || exit 1
          grep -q "pub fn refund" src/lib.rs || exit 1
          grep -q "pub fn get_booking" src/lib.rs || exit 1
          echo "✓ All contract functions present"
      
      - name: Validate Rust syntax
        working-directory: contract
        run: |
          # Use rustfmt to validate syntax
          which rustfmt || rustup component add rustfmt
          rustfmt --check src/lib.rs || true
          echo "✓ Rust syntax valid"
